<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice to Ambient</title>
<script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #b0b0c0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 2rem 1rem;
}
h1 {
  font-size: 1.4rem;
  color: #6a6a8a;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}
#status {
  font-size: 0.85rem;
  color: #5a5a7a;
  margin-bottom: 1rem;
  min-height: 1.2em;
}
.controls {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
}
button {
  background: #1a1a2e;
  color: #8888aa;
  border: 1px solid #2a2a4a;
  padding: 0.7rem 1.5rem;
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}
button:hover:not(:disabled) {
  background: #22223a;
  border-color: #4a4a6a;
  color: #aaaacc;
}
button:disabled {
  opacity: 0.3;
  cursor: default;
}
button.recording {
  border-color: #6a2a2a;
  color: #cc6666;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#level-meter {
  width: 300px;
  height: 4px;
  background: #1a1a2e;
  margin-bottom: 1rem;
  overflow: hidden;
}
#level-fill {
  height: 100%;
  width: 0%;
  background: #4a4a6a;
  transition: width 0.05s;
}
#progress-wrap {
  width: 300px;
  margin-bottom: 1.5rem;
  display: none;
}
#progress-bar {
  width: 100%;
  height: 3px;
  background: #1a1a2e;
  margin-bottom: 0.5rem;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: #4a4a6a;
  transition: width 0.25s linear;
}
#time-display {
  font-size: 0.75rem;
  color: #4a4a6a;
  text-align: center;
}
#detected-info {
  font-size: 0.7rem;
  color: #3a3a5a;
  margin-bottom: 1rem;
  min-height: 1em;
}

/* ─── Audio Controls Panel ─── */
#audio-controls {
  width: 100%;
  max-width: 600px;
  border: 1px solid #1a1a2e;
  padding: 1.2rem;
  margin-top: 0.5rem;
  display: none;
}
#audio-controls h2 {
  font-size: 0.75rem;
  color: #4a4a6a;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  text-align: center;
}
.ctrl-section {
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid #111122;
}
.ctrl-section:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}
.ctrl-section h3 {
  font-size: 0.7rem;
  color: #5a5a7a;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.4rem;
}
.ctrl-row label {
  font-size: 0.7rem;
  color: #6a6a8a;
  width: 100px;
  flex-shrink: 0;
  text-align: right;
}
.ctrl-row input[type="range"] {
  flex: 1;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: #1a1a2e;
  outline: none;
  border-radius: 2px;
}
.ctrl-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #4a4a6a;
  cursor: pointer;
  border: none;
}
.ctrl-row input[type="range"]::-webkit-slider-thumb:hover {
  background: #6a6a8a;
}
.ctrl-row .val {
  font-size: 0.65rem;
  color: #4a4a6a;
  width: 50px;
  text-align: left;
  flex-shrink: 0;
}
</style>
</head>
<body>

<h1>Voice to Ambient</h1>
<div id="status">Press record and hum, sing, or speak for a few seconds.</div>
<div id="detected-info"></div>
<div id="level-meter"><div id="level-fill"></div></div>
<div class="controls">
  <button id="btn-record">Record</button>
  <button id="btn-generate" disabled>Generate Soundscape</button>
  <button id="btn-stop-playback" disabled>Stop</button>
</div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="time-display">0:00 / 2:00</div>
</div>

<div id="audio-controls">
  <h2>Audio Controls</h2>

  <div class="ctrl-section">
    <h3>Voice Texture</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-voice-vol" min="-30" max="0" step="1" value="-6">
      <span class="val" id="val-voice-vol">-6 dB</span>
    </div>
    <div class="ctrl-row">
      <label>Grain Size</label>
      <input type="range" id="ctrl-voice-grain" min="0.03" max="0.2" step="0.005" value="0.08">
      <span class="val" id="val-voice-grain">80ms</span>
    </div>
    <div class="ctrl-row">
      <label>Reverb Send</label>
      <input type="range" id="ctrl-voice-send" min="0" max="1" step="0.01" value="0.65">
      <span class="val" id="val-voice-send">65%</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Sub Drone</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-drone-vol" min="-30" max="0" step="1" value="-12">
      <span class="val" id="val-drone-vol">-12 dB</span>
    </div>
    <div class="ctrl-row">
      <label>Mod Index</label>
      <input type="range" id="ctrl-drone-mod" min="0.1" max="2" step="0.05" value="0.5">
      <span class="val" id="val-drone-mod">0.50</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Piano</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-piano-vol" min="-30" max="0" step="1" value="-8">
      <span class="val" id="val-piano-vol">-8 dB</span>
    </div>
    <div class="ctrl-row">
      <label>Reverb Send</label>
      <input type="range" id="ctrl-piano-send" min="0" max="1" step="0.01" value="0.80">
      <span class="val" id="val-piano-send">80%</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Harp</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-harp-vol" min="-30" max="0" step="1" value="-10">
      <span class="val" id="val-harp-vol">-10 dB</span>
    </div>
    <div class="ctrl-row">
      <label>Reverb Send</label>
      <input type="range" id="ctrl-harp-send" min="0" max="1" step="0.01" value="0.70">
      <span class="val" id="val-harp-send">70%</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Vocal Pad</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-pad-vol" min="-30" max="0" step="1" value="-14">
      <span class="val" id="val-pad-vol">-14 dB</span>
    </div>
    <div class="ctrl-row">
      <label>Filter</label>
      <input type="range" id="ctrl-pad-filter" min="200" max="4000" step="50" value="2000">
      <span class="val" id="val-pad-filter">2000</span>
    </div>
    <div class="ctrl-row">
      <label>Reverb Send</label>
      <input type="range" id="ctrl-pad-send" min="0" max="1" step="0.01" value="0.90">
      <span class="val" id="val-pad-send">90%</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Reverb Bus</h3>
    <div class="ctrl-row">
      <label>Decay</label>
      <input type="range" id="ctrl-reverb-decay" min="2" max="15" step="0.5" value="8">
      <span class="val" id="val-reverb-decay">8.0s</span>
    </div>
    <div class="ctrl-row">
      <label>Delay Mix</label>
      <input type="range" id="ctrl-delay-wet" min="0" max="0.6" step="0.01" value="0.3">
      <span class="val" id="val-delay-wet">30%</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Master</h3>
    <div class="ctrl-row">
      <label>Volume</label>
      <input type="range" id="ctrl-master-vol" min="-30" max="0" step="1" value="-6">
      <span class="val" id="val-master-vol">-6 dB</span>
    </div>
  </div>
</div>

<script>
const DURATION = 120;
const SAMPLE_BASE = 'https://nbrosowsky.github.io/tonejs-instruments/samples';

const statusEl = document.getElementById('status');
const levelFill = document.getElementById('level-fill');
const btnRecord = document.getElementById('btn-record');
const btnGenerate = document.getElementById('btn-generate');
const btnStop = document.getElementById('btn-stop-playback');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const timeDisplay = document.getElementById('time-display');
const audioControlsPanel = document.getElementById('audio-controls');
const detectedInfoEl = document.getElementById('detected-info');

let nativeCtx = null;
let rawAudioBuffer = null;
let isRecording = false;
let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let analyserNode = null;
let levelAnimId = null;

// Soundscape state
let playing = false;
let progressAnimId = null;
let allDisposables = [];

// Live-adjustable node references
let nodes = {};

// ─── RECORDING ───

btnRecord.addEventListener('click', async () => {
  if (isRecording) stopRecording(); else await startRecording();
});

async function startRecording() {
  try {
    if (!nativeCtx) nativeCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (nativeCtx.state === 'suspended') await nativeCtx.resume();
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(mediaStream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      rawAudioBuffer = await nativeCtx.decodeAudioData(await blob.arrayBuffer());
      statusEl.textContent = `Recorded ${rawAudioBuffer.duration.toFixed(1)}s of audio. Ready to generate.`;
      btnGenerate.disabled = false;
      levelFill.style.width = '0%';
    };
    const source = nativeCtx.createMediaStreamSource(mediaStream);
    analyserNode = nativeCtx.createAnalyser();
    analyserNode.fftSize = 256;
    source.connect(analyserNode);
    startLevelMeter();
    mediaRecorder.start();
    isRecording = true;
    btnRecord.textContent = 'Stop Recording';
    btnRecord.classList.add('recording');
    btnGenerate.disabled = true;
    statusEl.textContent = 'Recording...';
  } catch (err) {
    statusEl.textContent = 'Mic access denied. Please allow microphone access.';
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  cancelAnimationFrame(levelAnimId);
  isRecording = false;
  btnRecord.textContent = 'Record';
  btnRecord.classList.remove('recording');
}

function startLevelMeter() {
  const data = new Uint8Array(analyserNode.fftSize);
  (function update() {
    analyserNode.getByteTimeDomainData(data);
    let max = 0;
    for (let i = 0; i < data.length; i++) { const v = Math.abs(data[i] - 128) / 128; if (v > max) max = v; }
    levelFill.style.width = (max * 100) + '%';
    levelAnimId = requestAnimationFrame(update);
  })();
}

// ─── VOICE ANALYSIS ───

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function detectPitch(buffer) {
  const data = buffer.getChannelData(0);
  const sampleRate = buffer.sampleRate;
  // Autocorrelation on a chunk from the middle of the recording
  const chunkSize = Math.min(8192, data.length);
  const start = Math.floor((data.length - chunkSize) / 2);
  const chunk = data.slice(start, start + chunkSize);

  // Normalise
  let maxVal = 0;
  for (let i = 0; i < chunk.length; i++) if (Math.abs(chunk[i]) > maxVal) maxVal = Math.abs(chunk[i]);
  if (maxVal < 0.01) return null; // too quiet
  for (let i = 0; i < chunk.length; i++) chunk[i] /= maxVal;

  // Autocorrelation
  const minLag = Math.floor(sampleRate / 600); // max 600Hz
  const maxLag = Math.floor(sampleRate / 50);  // min 50Hz
  let bestLag = 0, bestCorr = 0;
  for (let lag = minLag; lag <= maxLag && lag < chunk.length / 2; lag++) {
    let corr = 0;
    for (let i = 0; i < chunk.length / 2; i++) {
      corr += chunk[i] * chunk[i + lag];
    }
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }

  if (bestLag === 0 || bestCorr < chunk.length / 8) return null;
  return sampleRate / bestLag;
}

function hzToMidi(hz) { return Math.round(12 * Math.log2(hz / 440) + 69); }
function midiToHz(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function midiToName(midi) { return NOTE_NAMES[midi % 12] + (Math.floor(midi / 12) - 1); }

function calculateRMS(buffer) {
  const data = buffer.getChannelData(0);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
  return Math.sqrt(sum / data.length);
}

// ─── MUSIC THEORY HELPERS ───

function buildScale(rootMidi, type) {
  // Returns MIDI notes for 2 octaves of a scale
  const intervals = type === 'pentatonic'
    ? [0, 2, 4, 7, 9]
    : [0, 2, 4, 5, 7, 9, 11]; // major
  const notes = [];
  for (let oct = 0; oct < 3; oct++) {
    for (const iv of intervals) {
      notes.push(rootMidi + oct * 12 + iv);
    }
  }
  return notes;
}

function getChordVoicing(rootMidi, index) {
  const voicings = [
    [0, 7, 14],       // root + P5 + M9
    [0, 5, 7],        // root + P4 + P5
    [0, 3, 11],       // root + m3 + M7
    [0, 7, 19],       // root + P5 + P5+oct
    [-4, 0, 3],       // bVI: Ab C Eb relative
  ];
  const v = voicings[index % voicings.length];
  return v.map(interval => midiToName(rootMidi + interval));
}

function getPentatonicNote(rootMidi, rangeLow, rangeHigh) {
  const scale = buildScale(rootMidi, 'pentatonic').filter(n => n >= rangeLow && n <= rangeHigh);
  return midiToName(scale[Math.floor(Math.random() * scale.length)]);
}

// ─── SOUNDSCAPE ENGINE ───

btnGenerate.addEventListener('click', async () => {
  if (!rawAudioBuffer) return;
  stopSoundscape();
  await startSoundscape();
});

btnStop.addEventListener('click', () => stopSoundscape());

async function startSoundscape() {
  await Tone.start();
  Tone.getTransport().stop();
  Tone.getTransport().cancel();
  Tone.getTransport().position = 0;
  Tone.getTransport().bpm.value = 60;

  statusEl.textContent = 'Analysing voice...';
  btnGenerate.disabled = true;
  btnRecord.disabled = true;
  btnStop.disabled = false;

  // ─── Voice analysis ───
  const detectedHz = detectPitch(rawAudioBuffer);
  const rms = calculateRMS(rawAudioBuffer);
  let rootMidi;
  if (detectedHz && detectedHz > 50 && detectedHz < 600) {
    rootMidi = hzToMidi(detectedHz);
    detectedInfoEl.textContent = `Detected: ${midiToName(rootMidi)} (${Math.round(detectedHz)}Hz) | RMS: ${rms.toFixed(3)}`;
  } else {
    rootMidi = 48; // C3 fallback
    detectedInfoEl.textContent = `No clear pitch detected, using C3 | RMS: ${rms.toFixed(3)}`;
  }

  // Scale RMS for output level (quiet voice = more intimate)
  const rmsGain = Math.max(0.4, Math.min(1.0, rms * 8));

  // Root notes for different layers
  const droneRoot = rootMidi - 24; // 2 octaves down
  const pianoRoot = rootMidi;      // same octave
  const harpRoot = rootMidi + 12;  // octave up

  statusEl.textContent = 'Loading samples...';

  // ─── Load samplers ───
  // tonejs-instruments uses 's' for sharps in filenames: Ds2.mp3, Fs2.mp3, etc.
  const pianoSampler = new Tone.Sampler({
    urls: {
      'C2': 'C2.mp3', 'D#2': 'Ds2.mp3', 'F#2': 'Fs2.mp3', 'A2': 'A2.mp3',
      'C3': 'C3.mp3', 'D#3': 'Ds3.mp3', 'F#3': 'Fs3.mp3', 'A3': 'A3.mp3',
      'C4': 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3', 'A4': 'A4.mp3',
      'C5': 'C5.mp3',
    },
    baseUrl: `${SAMPLE_BASE}/piano/`,
  });
  const harpSampler = new Tone.Sampler({
    urls: {
      'C4': 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3', 'A4': 'A4.mp3',
      'C5': 'C5.mp3', 'D#5': 'Ds5.mp3', 'F#5': 'Fs5.mp3', 'A5': 'A5.mp3',
      'C6': 'C6.mp3',
    },
    baseUrl: `${SAMPLE_BASE}/harp/`,
  });

  // Wait for samples with a timeout so it doesn't hang forever
  await Promise.race([
    Tone.loaded(),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 15000))
  ]).catch(e => { console.warn('Sample loading issue:', e.message); });
  statusEl.textContent = 'Building soundscape...';

  // ─── MASTER BUS ───
  // EQ: HP 30Hz -> dip 400Hz -> shelf 8kHz -> compressor -> limiter -> volume -> destination
  const masterVol = new Tone.Volume(-6).toDestination();
  const limiter = new Tone.Limiter(-3).connect(masterVol);
  const masterComp = new Tone.Compressor({ threshold: -18, ratio: 3, attack: 0.1, release: 0.5 }).connect(limiter);
  const eqAir = new Tone.Filter({ frequency: 8000, type: 'highshelf', gain: 1.5 }).connect(masterComp);
  const eqMudDip = new Tone.Filter({ frequency: 400, type: 'peaking', gain: -2, Q: 0.5 }).connect(eqAir);
  const eqHP = new Tone.Filter({ frequency: 30, type: 'highpass' }).connect(eqMudDip);

  // ─── SHARED EFFECTS BUS (send bus — fully wet) ───
  const reverbBus = new Tone.Reverb({ decay: 8, preDelay: 0.04, wet: 1.0 });
  await reverbBus.generate();

  // Ping-pong delay after reverb
  const delayL = new Tone.FeedbackDelay({ delayTime: 1.2, feedback: 0.25, wet: 1.0 });
  const delayR = new Tone.FeedbackDelay({ delayTime: 1.8, feedback: 0.25, wet: 1.0 });
  const delayFilter = new Tone.Filter({ frequency: 3000, type: 'lowpass' });
  const delayMerge = new Tone.Gain(0.3);
  const fxBusOut = new Tone.Gain(1).connect(eqHP);

  reverbBus.connect(fxBusOut);
  reverbBus.connect(delayL);
  reverbBus.connect(delayR);
  delayL.connect(delayFilter);
  delayR.connect(delayFilter);
  delayFilter.connect(delayMerge);
  delayMerge.connect(fxBusOut);

  // ─── LAYER 1: VOICE GRANULAR TEXTURE ───
  const toneBuffer = new Tone.ToneAudioBuffer().fromArray(
    Array.from({ length: rawAudioBuffer.numberOfChannels }, (_, ch) => rawAudioBuffer.getChannelData(ch))
  );

  const voiceBandpass = new Tone.Filter({ frequency: 1200, type: 'bandpass', Q: 1.5 }).connect(eqHP);
  const voiceSend = new Tone.Gain(0.65).connect(reverbBus);
  voiceBandpass.connect(voiceSend);

  const voiceGrain = new Tone.GrainPlayer({
    url: toneBuffer,
    grainSize: 0.08,
    overlap: 0.6,
    loop: true,
    loopStart: 0,
    loopEnd: rawAudioBuffer.duration,
    playbackRate: 0.7,
    detune: 0,
  }).connect(voiceBandpass);
  voiceGrain.volume.value = -6;

  // ─── LAYER 2: SUB DRONE ───
  const droneLPF = new Tone.Filter({ frequency: 200, type: 'lowpass' }).connect(eqHP);
  const droneSend = new Tone.Gain(0.4).connect(reverbBus);
  droneLPF.connect(droneSend);

  const droneSynth = new Tone.FMSynth({
    oscillator: { type: 'sine' },
    harmonicity: 1.5,
    modulationIndex: 0.5,
    envelope: { attack: 4, decay: 2, sustain: 0.8, release: 6 },
    modulation: { type: 'sine' },
    modulationEnvelope: { attack: 2, decay: 1, sustain: 0.9, release: 4 },
  }).connect(droneLPF);
  droneSynth.volume.value = -12;

  // Drone mod index LFO
  const droneLFO = new Tone.LFO({ frequency: 0.02, min: 0.3, max: 0.8, type: 'sine' });
  droneLFO.connect(droneSynth.modulationIndex);

  // ─── LAYER 3: PIANO ───
  const pianoHP = new Tone.Filter({ frequency: 250, type: 'highpass' }).connect(eqHP);
  const pianoPresence = new Tone.Filter({ frequency: 3000, type: 'peaking', gain: 2, Q: 1.0 }).connect(pianoHP);
  const pianoPanner = new Tone.Panner(-0.2).connect(pianoPresence);
  const pianoSendGain = new Tone.Gain(0.80).connect(reverbBus);
  pianoPanner.connect(pianoSendGain);
  pianoSampler.connect(pianoPanner);
  pianoSampler.volume.value = -8;

  // ─── LAYER 4: HARP ───
  const harpHP = new Tone.Filter({ frequency: 400, type: 'highpass' }).connect(eqHP);
  const harpAir = new Tone.Filter({ frequency: 5000, type: 'highshelf', gain: 2 }).connect(harpHP);
  const harpPanner = new Tone.Panner(0.22).connect(harpAir);
  const harpSendGain = new Tone.Gain(0.70).connect(reverbBus);
  harpPanner.connect(harpSendGain);
  harpSampler.connect(harpPanner);
  harpSampler.volume.value = -10;

  // ─── LAYER 5: VOCAL PAD ───
  const padChorus = new Tone.Chorus({ frequency: 0.5, delayTime: 3.5, depth: 0.7, wet: 1.0 }).connect(eqHP);
  padChorus.start();
  const padFilter = new Tone.AutoFilter({
    frequency: 0.03, baseFrequency: 2000, octaves: 1.5, type: 'sine', depth: 1, wet: 1,
    filter: { type: 'lowpass', Q: 0.5 },
  }).connect(padChorus);
  padFilter.start();
  const padSendGain = new Tone.Gain(0.90).connect(reverbBus);
  padFilter.connect(padSendGain);

  const padA = new Tone.GrainPlayer({
    url: toneBuffer, grainSize: 0.4, overlap: 0.3, loop: true,
    loopStart: 0, loopEnd: rawAudioBuffer.duration, playbackRate: 0.4, detune: 0,
  }).connect(padFilter);

  const padB = new Tone.GrainPlayer({
    url: toneBuffer, grainSize: 0.3, overlap: 0.25, loop: true,
    loopStart: 0, loopEnd: rawAudioBuffer.duration, playbackRate: 0.8, detune: 700,
  }).connect(padFilter);

  const padGain = new Tone.Volume(-14);
  padA.connect(padGain);
  padB.connect(padGain);
  padGain.connect(padFilter);

  // ─── Store references for live control ───
  nodes = {
    masterVol, limiter, masterComp, eqAir, eqMudDip, eqHP,
    reverbBus, delayL, delayR, delayFilter, delayMerge, fxBusOut,
    voiceGrain, voiceBandpass, voiceSend,
    droneSynth, droneLPF, droneSend, droneLFO,
    pianoSampler, pianoHP, pianoPresence, pianoPanner, pianoSendGain,
    harpSampler, harpHP, harpAir, harpPanner, harpSendGain,
    padA, padB, padGain, padChorus, padFilter, padSendGain,
  };
  allDisposables = Object.values(nodes);

  // ─── MACRO TIMELINE via Tone.Transport ───
  const T = Tone.getTransport();

  // ── Section 1: Emergence (0:00 - 0:15) ──
  T.schedule(time => {
    // Sub drone fades in
    droneSynth.volume.setValueAtTime(-60, time);
    droneSynth.volume.linearRampToValueAtTime(-12, time + 10);
    droneSynth.triggerAttack(midiToName(droneRoot), time);
    droneLFO.start(time + 15); // LFO starts in section 2

    // Voice grain starts sparse
    voiceGrain.volume.setValueAtTime(-20, time);
    voiceGrain.volume.linearRampToValueAtTime(-6, time + 15);
    voiceGrain.start(time);

    // Vocal pad barely perceptible
    padGain.volume.setValueAtTime(-30, time);
    padGain.volume.linearRampToValueAtTime(-14, time + 40);
    padA.start(time);
    padB.start(time + 0.15);

    // Delay muted initially
    delayMerge.gain.setValueAtTime(0, time);
    delayMerge.gain.linearRampToValueAtTime(0.3, time + 20);
  }, 0);

  // ── Section 2: Establishing (0:15 - 0:40) ──
  // Piano enters with sparse single notes
  let lastPianoTime = 0;
  const schedulePianoNote = (startSec, endSec, chordChance) => {
    let t = startSec;
    let voicingIdx = 0;
    while (t < endSec) {
      const noteTime = t;
      const useChord = Math.random() < chordChance;
      const skip = Math.random() < 0.2; // 20% skip

      if (!skip) {
        T.schedule(time => {
          if (!playing) return;
          const velocity = 0.3 + Math.random() * 0.3; // 40-80 out of 127 ≈ 0.3-0.6
          if (useChord) {
            const chord = getChordVoicing(pianoRoot, voicingIdx);
            chord.forEach((note, i) => {
              const offset = i * (0.02 + Math.random() * 0.06); // 20-80ms humanise
              pianoSampler.triggerAttackRelease(note, '4n', time + offset, velocity);
            });
          } else {
            const scale = buildScale(pianoRoot, 'major').filter(n => n >= 48 && n <= 72);
            const note = midiToName(scale[Math.floor(Math.random() * scale.length)]);
            pianoSampler.triggerAttackRelease(note, '4n', time, velocity);
          }
          voicingIdx++;
        }, noteTime);
        lastPianoTime = noteTime;
      }
      t += 8 + Math.random() * 7; // 8-15 second intervals
    }
  };

  // Piano: establishing = mostly single notes
  schedulePianoNote(18, 40, 0.3);
  // Piano: heart = mostly chords
  schedulePianoNote(40, 75, 0.6);
  // Piano: thinning = back to single notes
  schedulePianoNote(75, 100, 0.25);
  // Piano: last note ~102
  schedulePianoNote(100, 103, 0.4);

  // ── Harp: enters at 0:45 ──
  const scheduleHarpNote = (startSec, endSec, intervalMin, intervalMax) => {
    let t = startSec;
    while (t < endSec) {
      const noteTime = t;
      const doGliss = Math.random() < 0.3; // 30% glissando gesture

      T.schedule(time => {
        if (!playing) return;
        const velocity = 0.2 + Math.random() * 0.25;
        if (doGliss) {
          for (let i = 0; i < 3; i++) {
            const note = getPentatonicNote(harpRoot, 60, 84);
            harpSampler.triggerAttackRelease(note, '2n', time + i * (0.15 + Math.random() * 0.15), velocity);
          }
        } else {
          const note = getPentatonicNote(harpRoot, 60, 84);
          harpSampler.triggerAttackRelease(note, '2n', time, velocity);
        }
      }, noteTime);

      t += intervalMin + Math.random() * (intervalMax - intervalMin);
    }
  };

  scheduleHarpNote(45, 75, 6, 12);    // Heart: regular
  scheduleHarpNote(75, 100, 15, 20);   // Thinning: sparse
  scheduleHarpNote(100, 106, 20, 25);  // Last note ~105

  // ── Section 3: Heart (0:40 - 1:15) ──
  T.schedule(time => {
    // Open up voice grain pitch slightly
    voiceGrain.playbackRate = 0.85;
  }, 40);

  // ── Section 4: Thinning (1:15 - 1:40) ──
  T.schedule(time => {
    voiceGrain.volume.linearRampToValueAtTime(-10, time + 25);
    voiceGrain.playbackRate = 0.7;
  }, 75);

  // ── Section 5: Dissolution (1:40 - 2:00) ──
  T.schedule(time => {
    // Voice grain fades
    voiceGrain.volume.linearRampToValueAtTime(-40, time + 18);

    // Vocal pad filter closes
    padFilter.baseFrequency = 600;

    // Drone fades out
    droneSynth.volume.linearRampToValueAtTime(-60, time + 15);

    // Pad fades
    padGain.volume.linearRampToValueAtTime(-40, time + 18);
  }, 100);

  // Final cleanup schedule
  T.schedule(() => {
    if (playing) stopSoundscape();
  }, DURATION + 3); // allow reverb tail

  // ── Start transport and playback ──
  T.start();
  playing = true;
  progressWrap.style.display = 'block';
  audioControlsPanel.style.display = 'block';
  statusEl.textContent = 'Playing...';

  // Progress animation
  const startWall = Tone.now();
  (function updateProgress() {
    if (!playing) return;
    const elapsed = Tone.getTransport().seconds;
    const pct = Math.min(elapsed / DURATION, 1);
    progressFill.style.width = (pct * 100) + '%';
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    timeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')} / 2:00`;
    if (pct < 1) progressAnimId = requestAnimationFrame(updateProgress);
  })();
}

function stopSoundscape() {
  playing = false;
  cancelAnimationFrame(progressAnimId);

  Tone.getTransport().stop();
  Tone.getTransport().cancel();

  allDisposables.forEach(n => { try { if (n && n.dispose) n.dispose(); } catch(e) {} });
  allDisposables = [];
  nodes = {};

  statusEl.textContent = rawAudioBuffer
    ? `Recorded ${rawAudioBuffer.duration.toFixed(1)}s of audio. Ready to generate.`
    : 'Press record and hum, sing, or speak for a few seconds.';
  btnGenerate.disabled = !rawAudioBuffer;
  btnRecord.disabled = false;
  btnStop.disabled = true;
  progressFill.style.width = '0%';
}

// ─── LIVE CONTROL WIRING ───

function wireSlider(id, valId, fmt, apply) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { const v = parseFloat(sl.value); vl.textContent = fmt(v); apply(v); });
}

// Voice texture
wireSlider('ctrl-voice-vol', 'val-voice-vol', v => v + ' dB',
  v => { if (nodes.voiceGrain) nodes.voiceGrain.volume.value = v; });
wireSlider('ctrl-voice-grain', 'val-voice-grain', v => Math.round(v * 1000) + 'ms',
  v => { if (nodes.voiceGrain) nodes.voiceGrain.grainSize = v; });
wireSlider('ctrl-voice-send', 'val-voice-send', v => Math.round(v * 100) + '%',
  v => { if (nodes.voiceSend) nodes.voiceSend.gain.value = v; });

// Sub drone
wireSlider('ctrl-drone-vol', 'val-drone-vol', v => v + ' dB',
  v => { if (nodes.droneSynth) nodes.droneSynth.volume.value = v; });
wireSlider('ctrl-drone-mod', 'val-drone-mod', v => v.toFixed(2),
  v => { if (nodes.droneSynth) nodes.droneSynth.modulationIndex.value = v; });

// Piano
wireSlider('ctrl-piano-vol', 'val-piano-vol', v => v + ' dB',
  v => { if (nodes.pianoSampler) nodes.pianoSampler.volume.value = v; });
wireSlider('ctrl-piano-send', 'val-piano-send', v => Math.round(v * 100) + '%',
  v => { if (nodes.pianoSendGain) nodes.pianoSendGain.gain.value = v; });

// Harp
wireSlider('ctrl-harp-vol', 'val-harp-vol', v => v + ' dB',
  v => { if (nodes.harpSampler) nodes.harpSampler.volume.value = v; });
wireSlider('ctrl-harp-send', 'val-harp-send', v => Math.round(v * 100) + '%',
  v => { if (nodes.harpSendGain) nodes.harpSendGain.gain.value = v; });

// Vocal pad
wireSlider('ctrl-pad-vol', 'val-pad-vol', v => v + ' dB',
  v => { if (nodes.padGain) nodes.padGain.volume.value = v; });
wireSlider('ctrl-pad-filter', 'val-pad-filter', v => Math.round(v),
  v => { if (nodes.padFilter) nodes.padFilter.baseFrequency = v; });
wireSlider('ctrl-pad-send', 'val-pad-send', v => Math.round(v * 100) + '%',
  v => { if (nodes.padSendGain) nodes.padSendGain.gain.value = v; });

// Reverb bus
wireSlider('ctrl-reverb-decay', 'val-reverb-decay', v => v.toFixed(1) + 's',
  v => { if (nodes.reverbBus) { nodes.reverbBus.decay = v; nodes.reverbBus.generate(); } });
wireSlider('ctrl-delay-wet', 'val-delay-wet', v => Math.round(v * 100) + '%',
  v => { if (nodes.delayMerge) nodes.delayMerge.gain.value = v; });

// Master
wireSlider('ctrl-master-vol', 'val-master-vol', v => v + ' dB',
  v => { if (nodes.masterVol) nodes.masterVol.volume.value = v; });
</script>
